 <h2>Cart Summary</h2>

<section id="cart-area" class="cart-card"></section>

    <div class="total-box">
        <strong>Total: $</strong><span id="total-box">0.00</span>
    </div>
	
	<h2>Shipping and Billing</h2>
	
<section class="shipping-layout">

<form action="submit.html" method="GET" id="shipping-form" onsubmit="submitShippingForm(event)">

  <div class="form-columns">

    <!-- Shipping -->
    <div class="form-section">
      <h3>Shipping</h3>

      <label for="firstnameShip">First Name</label>
      <input type="text" id="firstnameShip" required>

      <label for="lastnameShip">Last Name</label>
      <input type="text" id="lastnameShip" required>

      <label for="address1Ship">Address</label>
      <input type="text" id="address1Ship" required>

      <label for="cityShip">City</label>
      <input type="text" id="cityShip" required>

      <label for="stateShip">State</label>
      <input type="text" id="stateShip" required>

      <label for="countryShip">Country</label>
      <input type="text" id="countryShip" required>

      <label for="codeShip">Postal Code</label>
      <input type="text" id="codeShip" required>

      <label for="phone">Phone Number</label>
      <input type="text" id="phone" required>

      <label for="email">Email</label>
      <input type="text" id="email" required>
    </div>

    <!-- Billing -->
    <div class="form-section">
      <h3>Billing</h3>

      <label for="firstnameBill">First Name</label>
      <input type="text" id="firstnameBill" required>

      <label for="lastnameBill">Last Name</label>
      <input type="text" id="lastnameBill" required>

      <label for="address1Bill">Address</label>
      <input type="text" id="address1Bill" required>

      <label for="cityBill">City</label>
      <input type="text" id="cityBill" required>

      <label for="stateBill">State</label>
      <input type="text" id="stateBill" required>

      <label for="countryBill">Country</label>
      <input type="text" id="countryBill" required>

      <label for="codeBill">Postal Code</label>
      <input type="text" id="codeBill" required>
    </div>

  </div>

  <label class="checkbox-row">
    Billing same as shipping
    <input type="checkbox" id="useShip">
  </label>

  <input type="submit" value="Submit Order">

</form>
</section>
